- name: Download baksmali/smali 3.0.9 fat JARs
  shell: pwsh
  run: |
    $ErrorActionPreference = "Stop"

    New-Item -ItemType Directory -Force -Path tools | Out-Null

    $version = "3.0.9"

    # Exact asset names from the v3.0.9 release
    $bak = "https://github.com/baksmali/smali/releases/download/v$version/baksmali-$version-fat.jar"
    $sma = "https://github.com/baksmali/smali/releases/download/v$version/smali-$version-fat.jar"

    Invoke-WebRequest -Uri $bak -OutFile tools/baksmali.jar -UseBasicParsing -ErrorAction Stop
    Invoke-WebRequest -Uri $sma -OutFile tools/smali.jar   -UseBasicParsing -ErrorAction Stop

    # Sanity checks so we don't silently save HTML/404 pages
    if (-not (Test-Path tools/baksmali.jar) -or (Get-Item tools/baksmali.jar).Length -lt 100000) {
      throw "baksmali.jar looks wrong or is too small"
    }
    if (-not (Test-Path tools/smali.jar) -or (Get-Item tools/smali.jar).Length -lt 100000) {
      throw "smali.jar looks wrong or is too small"
    }

    Write-Host "baksmali: $((Get-Item tools/baksmali.jar).Length) bytes"
    Write-Host "smali:    $((Get-Item tools/smali.jar).Length) bytes"
