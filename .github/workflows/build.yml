name: Build SmaliPatcherEx Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SmaliPatcherEx.csproj

      - name: Build EXE
        run: dotnet publish SmaliPatcherEx.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmaliPatcherEx-Windows-x64
          path: ./publish/SmaliPatcherEx.exe
          retention-days: 90
