name: Build SmaliPatcherEx Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore SmaliPatcherEx.csproj

      - name: Build self-contained EXE
        run: |
          dotnet publish SmaliPatcherEx.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=embedded `
            --output ./publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmaliPatcherEx-Windows-x64
          path: ./publish/SmaliPatcherEx.exe
          retention-days: 90
